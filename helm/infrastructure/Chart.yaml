apiVersion: v2
name: infrastructure
description: >
  All backing infrastructure: MySQL, MongoDB, Keycloak, Kafka (Confluent),
  Schema Registry, Kafka UI, Prometheus, Grafana, Loki, Tempo.
type: application
version: 0.1.0
appVersion: "1.0.0"

  # mysql and keycloak are custom templates (see templates/) — bitnami chart images
  # for these components moved off Docker Hub in their latest versions.

dependencies:
  - name: mongodb
    version: ">=16.0.0"
    repository: "https://charts.bitnami.com/bitnami"

  - name: prometheus
    version: ">=25.0.0"
    repository: "https://prometheus-community.github.io/helm-charts"

  - name: grafana
    version: ">=8.0.0"
    repository: "https://grafana.github.io/helm-charts"

  - name: loki
    version: ">=6.0.0"
    repository: "https://grafana.github.io/helm-charts"

  - name: tempo
    version: ">=1.0.0"
    repository: "https://grafana.github.io/helm-charts"
